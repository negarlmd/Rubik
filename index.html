<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      *,
      *::before,
      *::after {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 80vh;
        background: rgb(182, 179, 179);
      }
      .cube {
        width: 400px;
        height: 400px;
        margin: 100px auto;
        position: relative;
        transition: 8s;
        transform-style: preserve-3d;
        &:hover {
          transform: rotate3d(1, 1, 1, 345deg);
        }
        > div {
          width: 100%;
          height: 100%;
          position: absolute;
          top: 0;
          left: 0;
          background-color: rgba(186, 43, 67, 0.966);
          text-align: center;
          display: flex;
          justify-content: center;
          align-items: center;
          color: white;
          font-size: 40px;

          &:nth-of-type(1) {
            transform: translateZ(200px);
            border: 4px solid deeppink;
          }
          &:nth-of-type(2) {
            transform: translateZ(-200px);
            border: 4px solid rgb(107, 23, 159);
          }
          &:nth-of-type(3) {
            transform-origin: left;
            transform: translatez(-200px) rotateY(-90deg);
            border: 4px solid rgb(12, 109, 131);
          }
          &:nth-of-type(4) {
            transform-origin: right;
            transform: translatez(-200px) rotateY(90deg);
            border: 4px solid rgb(25, 115, 13);
          }
          &:nth-of-type(5) {
            transform-origin: bottom;
            transform: translatez(-200px) rotatex(-90deg);
            border: 4px solid rgb(128, 177, 22);
          }
          &:nth-of-type(6) {
            transform-origin: top;
            transform: translatez(-200px) rotatex(90deg);
            border: 4px solid rgb(187, 110, 27);
          }
        }
      }
    </style>
  </head>

  <body>
    <div class="cube">
      <div>HTML</div>
      <div>CSS</div>
      <div>JS</div>
      <div>React</div>
      <div>Tailwind</div>
      <div>Bootstrap</div>
    </div>
  </body>
</html>
